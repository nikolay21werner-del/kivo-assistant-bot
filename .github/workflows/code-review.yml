name: Code Review

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install linters
        run: |
          python -m pip install flake8 pylint black
      
      - name: Check syntax
        run: python -m py_compile *.py || true
      
      - name: Run flake8
        run: flake8 *.py --max-line-length=120 || true
      
      - name: Run pylint
        run: pylint *.py --disable=all --enable=E,F || true
